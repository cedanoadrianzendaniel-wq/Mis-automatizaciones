<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reporte HSE — TGP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:20px}
    .card{background:#fff;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:600px;margin:0 auto;overflow:hidden}
    .header{background:linear-gradient(135deg,#1F3864,#2E75B6);color:#fff;padding:20px 24px}
    .header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
    .header p{font-size:12px;opacity:.8;margin-top:4px}
    .body{padding:24px}
    .section{margin-bottom:20px}
    .section-title{font-size:11px;font-weight:700;color:#1F3864;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #e8eef5}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
    select,input[type=text],input[type=date],textarea{
      width:100%;padding:9px 12px;border:1.5px solid #d0dae8;border-radius:7px;
      font-size:13px;color:#333;background:#fff;transition:border-color .2s
    }
    select:focus,input:focus,textarea:focus{outline:none;border-color:#2E75B6}
    .field{margin-bottom:0}
    .upload-zone{border:2px dashed #c0cfe0;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:background .2s;background:#fafcff}
    .upload-zone:hover{background:#eef4fb;border-color:#2E75B6}
    .upload-zone input{display:none}
    .upload-zone .icon{font-size:28px;margin-bottom:6px}
    .upload-zone p{font-size:12px;color:#777}
    .upload-zone .file-name{font-size:13px;font-weight:600;color:#1F3864;margin-top:6px}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#1F3864,#2E75B6);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s;margin-top:8px}
    .btn:hover{opacity:.9}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .progress{display:none;height:4px;background:#e0e8f0;border-radius:2px;margin-top:12px;overflow:hidden}
    .progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#1F3864,#2E75B6);border-radius:2px;transition:width .3s}
    .msg{margin-top:14px;padding:12px 16px;border-radius:7px;font-size:13px;font-weight:600;display:none}
    .msg.ok{background:#e8f5e9;color:#2e7d32;border-left:4px solid #43a047}
    .msg.err{background:#fdecea;color:#c62828;border-left:4px solid #ef5350}
    @media(max-width:480px){.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>Reporte HSE</h1>
    <p>Sistema de Reportes de Seguridad — TGP Geotecnia</p>
  </div>
  <div class="body">
    <form id="form">

      <!-- IDENTIFICACIÓN -->
      <div class="section">
        <div class="section-title">Identificación</div>
        <div class="grid-2">
          <div class="field">
            <label>Fecha *</label>
            <input type="date" id="fecha" required/>
          </div>
          <div class="field">
            <label>Responsable *</label>
            <select id="responsable" required>
              <option value="">Cargando...</option>
            </select>
          </div>
        </div>
        <div style="margin-top:12px">
          <label>Puesto</label>
          <input type="text" id="puesto" placeholder="Ej: Supervisor Geotécnico"/>
        </div>
      </div>

      <!-- UBICACIÓN -->
      <div class="section">
        <div class="section-title">Ubicación</div>
        <div class="grid-2">
          <div class="field">
            <label>Sector *</label>
            <select id="sector" required>
              <option value="">Seleccionar...</option>
              <option value="Costa">Costa</option>
              <option value="Sierra">Sierra</option>
              <option value="Selva">Selva</option>
            </select>
          </div>
          <div class="field">
            <label>Subcategoría *</label>
            <select id="subcategoria" required>
              <option value="">Seleccionar...</option>
              <option value="Geotecnia">Geotecnia</option>
            </select>
          </div>
        </div>
        <div style="margin-top:12px">
          <label>Frente de Trabajo *</label>
          <select id="frente" required>
            <option value="">Seleccione sector primero</option>
          </select>
        </div>
      </div>

      <!-- REPORTE -->
      <div class="section">
        <div class="section-title">Detalle del Reporte</div>
        <div class="field">
          <label>Tipo de Reporte *</label>
          <select id="tipoReporte" required>
            <option value="">Seleccionar...</option>
            <option value="Evaluacion ATS">Evaluación ATS</option>
            <option value="Evaluacion PTS">Evaluación PTS</option>
            <option value="Tarjetas STOP">Tarjetas STOP</option>
            <option value="Inspecciones de Seguridad">Inspecciones de Seguridad</option>
            <option value="Check List de Conduccion">Check List de Conducción</option>
          </select>
        </div>
        <div style="margin-top:12px">
          <label>Observaciones</label>
          <textarea id="observaciones" rows="3" placeholder="Observaciones adicionales (opcional)..."></textarea>
        </div>
      </div>

      <!-- ARCHIVO -->
      <div class="section">
        <div class="section-title">Adjunto</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('archivo').click()">
          <input type="file" id="archivo" accept=".pdf,.jpg,.jpeg,.png,.xlsx,.xls,.docx,.doc"/>
          <div class="icon">📎</div>
          <p>Toca para adjuntar archivo<br><small>PDF, JPG, PNG, Excel, Word — máx. 50MB</small></p>
          <div class="file-name" id="fileName"></div>
        </div>
      </div>

      <button type="submit" class="btn" id="btnEnviar">ENVIAR REPORTE HSE</button>
      <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
      <div class="msg" id="msg"></div>

    </form>
  </div>
</div>

<script>
// ─── Fecha de hoy ────────────────────────────────────────────────────────────
(function(){
  const hoy = new Date().toLocaleDateString("sv-SE", {timeZone:"America/Lima"});
  document.getElementById("fecha").value = hoy;
})();

// ─── Cargar supervisores ─────────────────────────────────────────────────────
fetch("/api/supervisores?excluir=CAPEX")
  .then(r => r.json())
  .then(lista => {
    const sel = document.getElementById("responsable");
    sel.innerHTML = '<option value="">Seleccionar...</option>';
    lista.forEach(s => {
      const o = document.createElement("option");
      o.value = s.nombre;
      o.textContent = s.nombre;
      sel.appendChild(o);
    });
  }).catch(() => {
    document.getElementById("responsable").innerHTML = '<option value="">Error al cargar</option>';
  });

// ─── Frentes dinámicos ───────────────────────────────────────────────────────
const FRENTES = {};
fetch("/api/todos-frentes")
  .then(r => r.json())
  .then(data => Object.assign(FRENTES, data));

document.getElementById("sector").addEventListener("change", actualizarFrentes);
document.getElementById("subcategoria").addEventListener("change", actualizarFrentes);

function actualizarFrentes() {
  const sector = document.getElementById("sector").value;
  const subcat = document.getElementById("subcategoria").value;
  const sel    = document.getElementById("frente");
  const key    = sector + "_" + subcat;
  const lista  = FRENTES[key] || [];
  sel.innerHTML = lista.length
    ? '<option value="">Seleccionar frente...</option>'
    : '<option value="">Sin frentes disponibles</option>';
  lista.forEach(f => {
    const o = document.createElement("option");
    o.value = o.textContent = f;
    sel.appendChild(o);
  });
}

// ─── Archivo ─────────────────────────────────────────────────────────────────
document.getElementById("archivo").addEventListener("change", function(){
  const f = this.files[0];
  document.getElementById("fileName").textContent = f ? f.name : "";
});

// ─── Progreso animado ────────────────────────────────────────────────────────
let progInterval;
function startProgress(){
  const bar = document.getElementById("progressBar");
  const wrap = document.getElementById("progress");
  wrap.style.display = "block";
  bar.style.width = "0%";
  let p = 0;
  progInterval = setInterval(() => {
    p = p < 85 ? p + Math.random()*8 : p + .5;
    if(p > 95) p = 95;
    bar.style.width = p + "%";
  }, 400);
}
function endProgress(){
  clearInterval(progInterval);
  document.getElementById("progressBar").style.width = "100%";
  setTimeout(() => { document.getElementById("progress").style.display = "none"; }, 600);
}

// ─── Submit ───────────────────────────────────────────────────────────────────
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();
  const btn = document.getElementById("btnEnviar");
  const msg = document.getElementById("msg");
  msg.style.display = "none";
  btn.disabled = true;
  btn.textContent = "Enviando...";
  startProgress();

  try {
    const archivo = document.getElementById("archivo").files[0];
    let archivoBase64 = "", nombreArchivo = "", mimeType = "";

    if(archivo){
      if(archivo.size > 52428800){
        throw new Error("El archivo supera el límite de 50MB.");
      }
      nombreArchivo = archivo.name;
      mimeType = archivo.type || "application/octet-stream";
      archivoBase64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload  = () => res(reader.result.split(",")[1]);
        reader.onerror = () => rej(new Error("Error al leer el archivo"));
        reader.readAsDataURL(archivo);
      });
    }

    const payload = {
      fecha:        document.getElementById("fecha").value,
      responsable:  document.getElementById("responsable").value,
      puesto:       document.getElementById("puesto").value,
      sector:       document.getElementById("sector").value,
      subcategoria: document.getElementById("subcategoria").value,
      frente:       document.getElementById("frente").value,
      tipoReporte:  document.getElementById("tipoReporte").value,
      observaciones:document.getElementById("observaciones").value,
      archivoBase64,
      nombreArchivo,
      mimeType
    };

    const resp = await fetch("/api/reporte-hse", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const json = await resp.json();

    endProgress();

    if(json.ok){
      msg.className = "msg ok";
      msg.textContent = "✅ Reporte HSE enviado. El coordinador fue notificado.";
      msg.style.display = "block";
      document.getElementById("form").reset();
      document.getElementById("fileName").textContent = "";
      // restaurar fecha
      document.getElementById("fecha").value = new Date().toLocaleDateString("sv-SE",{timeZone:"America/Lima"});
    } else {
      throw new Error(json.error || "Error desconocido");
    }
  } catch(err){
    endProgress();
    msg.className = "msg err";
    msg.textContent = "❌ " + err.message;
    msg.style.display = "block";
  }

  btn.disabled = false;
  btn.textContent = "ENVIAR REPORTE HSE";
});
</script>
</body>
</html>
