<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portal TGP — Bureau Veritas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#1F3864;--sec:#2E75B6;--accent:#E67E22;
  --verde:#27AE60;--rojo:#E74C3C;--amarillo:#F39C12;
  --bg:#F0F2F5;--card:#FFF;--txt:#2C3E50;--txt2:#7F8C8D;
  --shadow:0 2px 8px rgba(0,0,0,.1);--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:70px}

/* TOP BAR */
.topbar{background:var(--pri);color:#fff;padding:14px 20px;font-size:15px;font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar small{font-weight:400;opacity:.7;font-size:12px;margin-left:6px}
.topbar .logout{font-size:12px;opacity:.8;cursor:pointer;background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 10px;border-radius:6px}
.topbar .logout:hover{opacity:1;background:rgba(255,255,255,.1)}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;align-items:center;height:60px;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:100}
.bottomnav .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 12px;color:var(--txt2);font-size:10px;font-weight:600;transition:color .2s;position:relative;-webkit-tap-highlight-color:transparent}
.bottomnav .nav-item.active{color:var(--pri)}
.bottomnav .nav-item .nav-icon{font-size:22px;line-height:1}
.bottomnav .nav-item .badge{position:absolute;top:0;right:2px;background:var(--rojo);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700}

/* CONTENT */
.content{padding:16px;max-width:600px;margin:0 auto}
.section{display:none}.section.active{display:block}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700;color:var(--pri);margin-bottom:10px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.kpi-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;text-align:center}
.kpi-card .kpi-val{font-size:26px;font-weight:800;color:var(--pri)}
.kpi-card .kpi-lbl{font-size:11px;color:var(--txt2);margin-top:4px}

/* PROGRESS BAR */
.prog-bar{background:#E8EEF5;border-radius:6px;height:8px;overflow:hidden;margin:6px 0}
.prog-bar .fill{height:100%;border-radius:6px;transition:width .5s}
.prog-bar .fill.blue{background:var(--sec)}
.prog-bar .fill.green{background:var(--verde)}
.prog-bar .fill.orange{background:var(--accent)}

/* TIMELINE BAR */
.timeline{padding:12px 16px;margin-bottom:10px}
.timeline .dates{display:flex;justify-content:space-between;font-size:11px;color:var(--txt2);margin-top:4px}

/* SECTOR CARDS */
.sector-card{cursor:pointer;transition:transform .15s}
.sector-card:active{transform:scale(.98)}
.sector-icon{font-size:28px;margin-bottom:8px}

/* FRENTE CARDS */
.frente-card{cursor:pointer;transition:transform .15s}
.frente-card:active{transform:scale(.98)}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--sec);cursor:pointer;margin-bottom:12px;font-weight:600}
.back-btn:hover{text-decoration:underline}

/* BADGE ESTADOS */
.estado{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.estado.pendiente{background:#FFF3CD;color:#856404}
.estado.en-proceso{background:#D6E4F7;color:#1F3864}
.estado.completado{background:#D4EDDA;color:#155724}

/* ALERTA CARDS */
.alerta-card{border-left:4px solid;padding:12px 14px}
.alerta-card.critical{border-color:var(--rojo);background:#FFF5F5}
.alerta-card.warning{border-color:var(--accent);background:#FFF8F0}

/* CIRCULAR INDICATOR */
.circular{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 16px;position:relative}
.circular::after{content:'';position:absolute;inset:8px;border-radius:50%;background:#fff}
.circular span{position:relative;z-index:1}

/* TASK CARD */
.task-card{border-left:4px solid var(--sec);cursor:pointer}
.task-card .task-name{font-weight:700;font-size:13px;margin-bottom:4px}
.task-card .task-meta{font-size:11px;color:var(--txt2)}
.task-plan{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px}

/* WEEK GROUP */
.week-group{margin-bottom:16px}
.week-header{font-size:12px;font-weight:700;color:var(--sec);padding:6px 0;border-bottom:2px solid var(--sec);margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between}

/* FAB */
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--pri);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer;z-index:90;border:none}
.fab:hover{background:var(--sec)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;color:var(--pri);margin-bottom:16px}
.modal label{font-size:12px;font-weight:600;color:var(--txt2);display:block;margin-bottom:4px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit}
.modal textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}
.btn-pri{background:var(--pri);color:#fff}
.btn-sec{background:#eee;color:var(--txt)}

/* SEGURIDAD TYPE CARDS */
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.seg-type-card{text-align:center;padding:12px}
.seg-type-card .seg-val{font-size:20px;font-weight:800;color:var(--pri)}
.seg-type-card .seg-lbl{font-size:10px;color:var(--txt2);margin-top:2px}

/* DOC LIST */
.doc-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.doc-row:last-child{border-bottom:none}
.doc-row a{color:var(--sec);text-decoration:none;font-weight:600}

/* ACTIVITY */
.act-row{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:12px}
.act-row:last-child{border-bottom:none}

/* SPINNER */
.spinner-wrap{display:flex;justify-content:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid #E8EEF5;border-top-color:var(--sec);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CHART CONTAINER */
.chart-wrap{position:relative;height:250px;margin-bottom:14px}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:14px}
.filter-bar select{flex:1;padding:8px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,var(--pri),var(--sec))}
.login-card{background:#fff;border-radius:16px;padding:40px 30px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:800;color:var(--pri);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--txt2);margin-bottom:24px}
.login-card input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;text-align:center;margin-bottom:14px}
.login-card button{width:100%;padding:13px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.login-card button:hover{background:var(--sec)}
.login-err{color:var(--rojo);font-size:13px;margin-top:8px;display:none}

/* DETAIL TABS */
.detail-tabs{display:flex;gap:0;margin-bottom:14px;overflow-x:auto}
.detail-tab{flex:1;text-align:center;padding:10px 8px;font-size:12px;font-weight:700;color:var(--txt2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.detail-tab.active{color:var(--pri);border-bottom-color:var(--pri)}

/* UPLOAD */
.upload-zone{border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;font-size:13px;color:var(--txt2);cursor:pointer;transition:border-color .2s}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--sec);color:var(--sec)}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">&#9881;</div>
    <div class="login-title">Portal TGP</div>
    <div class="login-sub">Bureau Veritas del Peru</div>
    <input type="password" id="inputClave" placeholder="Ingrese clave de acceso" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Ingresar</button>
    <div class="login-err" id="loginErr">Clave incorrecta</div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="appView" style="display:none">
  <!-- Top Bar -->
  <div class="topbar">
    <div>Portal TGP <small>Bureau Veritas</small></div>
    <button class="logout" onclick="logout()">Salir</button>
  </div>

  <!-- Sections -->
  <div class="content">
    <div id="secTablero" class="section active"></div>
    <div id="secSeguridad" class="section"></div>
    <div id="secInformes" class="section"></div>
    <div id="secProgramacion" class="section"></div>
    <div id="secAlertas" class="section"></div>
  </div>

  <!-- FAB for Programacion -->
  <button id="fabAdd" class="fab" style="display:none" onclick="abrirModalTarea()">+</button>

  <!-- Bottom Navigation -->
  <nav class="bottomnav">
    <div class="nav-item active" onclick="switchTab('Tablero')" id="navTablero">
      <span class="nav-icon">&#9632;</span>Tablero
    </div>
    <div class="nav-item" onclick="switchTab('Seguridad')" id="navSeguridad">
      <span class="nav-icon">&#9733;</span>Seguridad
    </div>
    <div class="nav-item" onclick="switchTab('Informes')" id="navInformes">
      <span class="nav-icon">&#9776;</span>Informes
    </div>
    <div class="nav-item" onclick="switchTab('Programacion')" id="navProgramacion">
      <span class="nav-icon">&#9998;</span>Programacion
    </div>
    <div class="nav-item" onclick="switchTab('Alertas')" id="navAlertas">
      <span class="nav-icon">&#9888;</span>Alertas
      <span class="badge" id="alertBadge" style="display:none">0</span>
    </div>
  </nav>
</div>

<!-- ═══ MODAL TAREA ═══ -->
<div class="modal-bg" id="modalTarea">
  <div class="modal">
    <h3 id="modalTareaTitle">Nueva Tarea</h3>
    <label>Sector</label>
    <select id="tSector" onchange="llenarFrentesModal()">
      <option value="">Seleccione...</option>
      <option>Costa</option><option>Sierra</option><option>Selva</option>
    </select>
    <label>Frente de Trabajo</label>
    <select id="tFrente"><option value="">Seleccione sector primero</option></select>
    <label>Nombre de la Tarea</label>
    <input id="tNombre" placeholder="Ej: Excavacion zona norte">
    <label>Descripcion</label>
    <textarea id="tDesc" placeholder="Descripcion breve..."></textarea>
    <label>Fecha Inicio</label>
    <input type="date" id="tFini">
    <label>Fecha Fin</label>
    <input type="date" id="tFfin">
    <label>Cantidad Planificada</label>
    <input type="number" id="tPlan" placeholder="Ej: 100">
    <label>Unidad</label>
    <input id="tUnidad" placeholder="Ej: m3, ml, und">
    <label>Responsable</label>
    <input id="tResp" placeholder="Nombre del responsable">
    <div class="modal-btns">
      <button class="btn-sec" onclick="cerrarModalTarea()">Cancelar</button>
      <button class="btn-pri" onclick="guardarTarea()">Guardar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL EDITAR TAREA ═══ -->
<div class="modal-bg" id="modalEditar">
  <div class="modal">
    <h3>Actualizar Tarea</h3>
    <div id="editInfo"></div>
    <label>Estado</label>
    <select id="eEstado">
      <option>Pendiente</option><option>En Proceso</option><option>Completado</option>
    </select>
    <label>Ejecutado</label>
    <input type="number" id="eEjecutado" placeholder="Cantidad ejecutada">
    <div class="modal-btns">
      <button class="btn-sec" onclick="cerrarModalEditar()">Cancelar</button>
      <button class="btn-pri" onclick="guardarEdicion()">Actualizar</button>
      <button style="flex:1;padding:12px;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;background:var(--rojo);color:#fff" onclick="eliminarTareaModal()">Eliminar</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL SUBIR DOCUMENTO ═══ -->
<div class="modal-bg" id="modalDoc">
  <div class="modal">
    <h3>Subir Documento</h3>
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      Arrastra un archivo aqui o haz clic para seleccionar
    </div>
    <input type="file" id="fileInput" style="display:none" onchange="previewFile(this)">
    <div id="filePreview" style="margin-top:10px;font-size:13px"></div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="cerrarModalDoc()">Cancelar</button>
      <button class="btn-pri" onclick="subirDoc()">Subir</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
var currentTab = 'Tablero';
var informesLevel = 'sectores'; // sectores | frentes | detalle
var informesSector = '';
var informesFrente = '';
var alertCount = 0;
var editTaskId = '';
var uploadFile = null;
var chartInstances = {};
var frentesPortal = {
  Costa:['SOPORTE A INGENIERIA','VIAL','URGENCIA VIAL KP 472+700 AL KP 482+000','KP 714+155 AL KP 730+698','MG KP 519+526 AL KP 540+839'],
  Sierra:['MG KP 170+000 AL KP 179+850','MG KP 179+850 AL KP 194+000','MG KP 194+000 AL KP 209+360','APOYO A INGENIERIA'],
  Selva:['M.G. KP 43+830 - KP 53+000 - ETAPA 1','M.G. KP 0+000 - KP 12+000 - ETAPA 1','M.G. KP 25+000 - KP 35+000','TAI KP 112+300','Reparacion de F.O. KP61+150','Perforaciones del KP126','Perforaciones del KP55+118','Apoyo / Ingenieria']
};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function spinner(){return '<div class="spinner-wrap"><div class="spinner"></div></div>';}
function $(id){return document.getElementById(id);}
function estadoClass(e){if(!e)return'pendiente';var l=e.toLowerCase();if(l.indexOf('complet')>=0)return'completado';if(l.indexOf('proceso')>=0)return'en-proceso';return'pendiente';}
function colorForPct(p){return p>=80?'var(--verde)':p>=50?'var(--sec)':p>=30?'var(--accent)':'var(--rojo)';}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
function login(){
  var c=$('inputClave').value.trim();
  if(!c)return;
  google.script.run.withSuccessHandler(function(ok){
    if(ok){$('loginView').style.display='none';$('appView').style.display='block';loadTab('Tablero');loadAlertCount();}
    else{$('loginErr').style.display='block';}
  }).withFailureHandler(function(e){alert('Error: '+e.message);}).verificarClavePortal(c);
}
function logout(){$('appView').style.display='none';$('loginView').style.display='flex';$('inputClave').value='';$('loginErr').style.display='none';}

// ═══════════════════════════════════════════════════════
// TAB NAVIGATION
// ═══════════════════════════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  $('nav'+tab).classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  $('sec'+tab).classList.add('active');
  $('fabAdd').style.display=(tab==='Programacion')?'flex':'none';
  if(tab==='Informes'){informesLevel='sectores';informesSector='';informesFrente='';}
  loadTab(tab);
}

function loadTab(tab){
  switch(tab){
    case'Tablero':loadTablero();break;
    case'Seguridad':loadSeguridad();break;
    case'Informes':loadInformes();break;
    case'Programacion':loadProgramacion();break;
    case'Alertas':loadAlertas();break;
  }
}

function loadAlertCount(){
  google.script.run.withSuccessHandler(function(arr){
    alertCount=arr?arr.length:0;
    var b=$('alertBadge');
    if(alertCount>0){b.textContent=alertCount;b.style.display='flex';}
    else{b.style.display='none';}
  }).obtenerAlertas();
}

// ═══════════════════════════════════════════════════════
// TAB: TABLERO
// ═══════════════════════════════════════════════════════
function loadTablero(){
  var sec=$('secTablero');
  sec.innerHTML=spinner();
  google.script.run.withSuccessHandler(function(d){
    if(!d){sec.innerHTML='<div class="card">Sin datos</div>';return;}
    var h='';

    // Timeline del contrato
    h+='<div class="card timeline">';
    h+='<div style="font-size:13px;font-weight:700;color:var(--pri)">Avance del Contrato BV-TGP</div>';
    h+='<div class="prog-bar" style="margin:8px 0"><div class="fill blue" style="width:'+d.pctTiempo+'%"></div></div>';
    h+='<div class="dates"><span>01/02/2026</span><span style="font-weight:700">'+Math.round(d.pctTiempo)+'% tiempo</span><span>31/01/2029</span></div>';
    h+='<div style="font-size:11px;color:var(--txt2);margin-top:4px">'+d.diasTranscurridos+' dias transcurridos &nbsp;|&nbsp; '+d.diasRestantes+' dias restantes</div>';
    h+='</div>';

    // KPIs
    h+='<div class="kpi-grid">';
    h+='<div class="kpi-card"><div class="kpi-val">'+d.totalFrentes+'</div><div class="kpi-lbl">Frentes Activos</div></div>';
    h+='<div class="kpi-card"><div class="kpi-val" style="color:'+colorForPct(d.avancePromedio)+'">'+Math.round(d.avancePromedio)+'%</div><div class="kpi-lbl">Avance Promedio</div></div>';
    h+='<div class="kpi-card"><div class="kpi-val" style="color:'+colorForPct(d.pctTareas)+'">'+Math.round(d.pctTareas)+'%</div><div class="kpi-lbl">Tareas Completadas</div></div>';
    h+='<div class="kpi-card"><div class="kpi-val" style="color:'+(d.alertasActivas>0?'var(--rojo)':'var(--verde)')+'">'+d.alertasActivas+'</div><div class="kpi-lbl">Alertas Activas</div></div>';
    h+='</div>';

    // Panel de Control — Frentes de Trabajo
    h+='<div style="font-size:15px;font-weight:800;color:var(--pri);margin:8px 0 12px">Panel de Control — Frentes de Trabajo</div>';
    var icons={Costa:'&#128205;',Sierra:'&#128205;',Selva:'&#128205;'};
    (d.porSector||[]).forEach(function(s){
      h+='<div class="card" style="margin-bottom:12px">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
      h+='<span style="color:var(--rojo);font-size:18px">'+icons[s.sector]+'</span>';
      h+='<span style="font-size:18px;font-weight:800;color:var(--pri)">'+esc(s.sector)+'</span>';
      h+='</div>';
      h+='<div style="display:flex;justify-content:space-around;margin-bottom:12px">';
      h+='<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:var(--sec)">'+s.totalFrentes+'</div><div style="font-size:10px;font-weight:700;color:var(--txt2);letter-spacing:.5px">FRENTES</div></div>';
      h+='<div style="text-align:center"><div style="font-size:28px;font-weight:800;color:'+colorForPct(s.avancePromedio)+'">'+s.avancePromedio+'%</div><div style="font-size:10px;font-weight:700;color:var(--txt2);letter-spacing:.5px">AVANCE PROMEDIO</div></div>';
      h+='</div>';
      h+='<div class="prog-bar"><div class="fill blue" style="width:'+s.avancePromedio+'%"></div></div>';
      h+='<div style="font-size:11px;color:var(--txt2);text-align:right;margin:4px 0 10px">'+s.avancePromedio+'% completado</div>';
      h+='<div style="font-size:11px;color:var(--txt2);margin-bottom:12px">&#128197; Ultima actividad: '+(s.ultimaActividad||'-')+'</div>';

var progSector='';
var progFrente='';

function loadProgramacion(){
  var sec=$('secProgramacion');
  var h='<div style="font-size:16px;font-weight:800;color:var(--pri);margin-bottom:14px">Programacion</div>';
  h+='<div class="filter-bar">';

function llenarFrentesFiltro(){
  var s=$('filtSector').value;
  var sel=$('filtFrente');
  sel.innerHTML='<option value="">Todos los Frentes</option>';
  if(s&&frentesPortal[s]){
    frentesPortal[s].forEach(function(f){sel.innerHTML+='<option>'+esc(f)+'</option>';});
  }
  if(progFrente)sel.value=progFrente;
}

function filtrarProg(){
  progSector=$('filtSector').value;
  llenarFrentesFiltro();
  progFrente=$('filtFrente').value;
  cargarTareas();
}

function cargarTareas(){
  var wrap=$('progContent');
  wrap.innerHTML=spinner();
  google.script.run.withSuccessHandler(function(semanas){
    if(!semanas||!semanas.length){wrap.innerHTML='<div class="card">No hay tareas registradas</div>';return;}
    var h='';
    semanas.forEach(function(sem){
      h+='<div class="week-group">';
      h+='<div class="week-header" onclick="toggleWeek(this)"><span>Semana: '+esc(sem.semana)+'</span><span>'+sem.tareas.length+' tareas &#9660;</span></div>';
      h+='<div class="week-body">';
      sem.tareas.forEach(function(t){
        var pct=t.planCantidad>0?Math.round((t.ejecutado||0)/t.planCantidad*100):0;
        h+='<div class="card task-card" onclick="editarTarea(\''+esc(t.id)+'\')" data-id="'+esc(t.id)+'">';
        h+='<div class="task-name">'+esc(t.nombre)+'</div>';
        h+='<div class="task-meta">'+esc(t.frente)+' | '+esc(t.sector)+'</div>';
        h+='<div class="task-meta">'+esc(t.fechaInicio)+' a '+esc(t.fechaFin)+'</div>';
        h+='<div class="task-plan">';
        h+='<span>Plan: '+(t.planCantidad||0)+' '+(t.planUnidad||'')+'</span>';
        h+='<span style="font-weight:700">Ejec: '+(t.ejecutado||0)+'</span>';
        h+='</div>';
        h+='<div class="prog-bar" style="margin-top:6px"><div class="fill '+(pct>=100?'green':pct>=50?'blue':'orange')+'" style="width:'+Math.min(pct,100)+'%"></div></div>';
        h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">';
        h+='<span class="estado '+estadoClass(t.estado)+'">'+esc(t.estado||'Pendiente')+'</span>';
        h+='<span style="font-size:11px;color:var(--txt2)">'+esc(t.responsable||'')+'</span>';
        h+='</div></div>';
      });
      h+='</div></div>';
    });
    wrap.innerHTML=h;
  }).withFailureHandler(function(e){wrap.innerHTML='<div class="card">Error: '+esc(e.message)+'</div>';}).obtenerTareasPorSemana(progSector,progFrente);
}

function toggleWeek(el){
  var body=el.nextElementSibling;
  body.style.display=body.style.display==='none'?'block':'none';
}

function abrirModalTarea(){
  $('modalTareaTitle').textContent='Nueva Tarea';
  $('tSector').value='';$('tFrente').innerHTML='<option value="">Seleccione sector primero</option>';
  $('tNombre').value='';$('tDesc').value='';$('tFini').value='';$('tFfin').value='';

    frentesPortal[s].forEach(function(f){sel.innerHTML+='<option>'+esc(f)+'</option>';});
  }
}

function guardarTarea(){
  var datos={
    sector:$('tSector').value,frente:$('tFrente').value,
    nombre:$('tNombre').value,descripcion:$('tDesc').value,
    fechaInicio:$('tFini').value,fechaFin:$('tFfin').value,
    planCantidad:parseFloat($('tPlan').value)||0,
    planUnidad:$('tUnidad').value,responsable:$('tResp').value
  };
  if(!datos.sector||!datos.frente||!datos.nombre){alert('Complete sector, frente y nombre');return;}
  if(!datos.fechaInicio||!datos.fechaFin){alert('Complete fechas');return;}
  google.script.run.withSuccessHandler(function(){
    cerrarModalTarea();cargarTareas();loadAlertCount();
  }).withFailureHandler(function(e){alert('Error: '+e.message);}).agregarTarea(datos);
}

function editarTarea(id){
  editTaskId=id;

  }
  $('eEstado').value='Pendiente';$('eEjecutado').value='';
  $('modalEditar').classList.add('show');
}

function guardarEdicion(){
  var estado=$('eEstado').value;
  var ejec=parseFloat($('eEjecutado').value)||0;
  google.script.run.withSuccessHandler(function(){
    cerrarModalEditar();cargarTareas();loadAlertCount();
  }).withFailureHandler(function(e){alert('Error: '+e.message);}).actualizarTarea(editTaskId,estado,ejec);
}

function eliminarTareaModal(){
  if(!confirm('Eliminar esta tarea?'))return;
  google.script.run.withSuccessHandler(function(){
    cerrarModalEditar();cargarTareas();loadAlertCount();
  }).withFailureHandler(function(e){alert('Error: '+e.message);}).eliminarTarea(editTaskId);
}

// ═══════════════════════════════════════════════════════
// TAB: ALERTAS
// ═══════════════════════════════════════════════════════
function loadAlertas(){
  var sec=$('secAlertas');
  sec.innerHTML=spinner();
  google.script.run.withSuccessHandler(function(arr){
    if(!arr||!arr.length){sec.innerHTML='<div style="font-size:16px;font-weight:800;color:var(--pri);margin-bottom:14px">Alertas</div><div class="card" style="text-align:center;color:var(--verde)"><div style="font-size:36px;margin-bottom:8px">&#10003;</div>No hay alertas activas</div>';return;}
    // Sort: critical first
    arr.sort(function(a,b){return a.tipo==='critical'?-1:b.tipo==='critical'?1:0;});
    var h='<div style="font-size:16px;font-weight:800;color:var(--pri);margin-bottom:14px">Alertas ('+arr.length+')</div>';
    arr.forEach(function(a){
      h+='<div class="card alerta-card '+a.tipo+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:start">';
      h+='<div>';
      h+='<div style="font-weight:700;font-size:13px">'+(a.tipo==='critical'?'&#9888; CRITICA':'&#9888; Advertencia')+'</div>';
      h+='<div style="font-size:13px;margin-top:4px">'+esc(a.tarea||a.mensaje)+'</div>';
      h+='<div style="font-size:11px;color:var(--txt2);margin-top:4px">'+esc(a.frente)+' | '+esc(a.sector)+'</div>';
      h+='</div>';
      h+='<div style="text-align:right;min-width:60px">';
      h+='<div style="font-size:20px;font-weight:800;color:'+(a.tipo==='critical'?'var(--rojo)':'var(--accent)')+'">'+a.diasVencido+'</div>';
      h+='<div style="font-size:10px;color:var(--txt2)">dias vencido</div>';
      h+='</div></div></div>';
    });
    sec.innerHTML=h;
    // Update badge
    alertCount=arr.length;
    var b=$('alertBadge');
    b.textContent=alertCount;b.style.display='flex';
  }).withFailureHandler(function(e){sec.innerHTML='<div class="card">Error: '+esc(e.message)+'</div>';}).obtenerAlertas();
}

// ═══════════════════════════════════════════════════════
// DOCUMENTOS - UPLOAD
// ═══════════════════════════════════════════════════════
var dropZone;
function initDragDrop(){
  dropZone=$('dropZone');
  if(!dropZone)return;
  dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('dragover');});
  dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('dragover');});
  dropZone.addEventListener('drop',function(e){e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleUploadFile(e.dataTransfer.files[0]);});
}
function previewFile(inp){if(inp.files.length)handleUploadFile(inp.files[0]);}
function handleUploadFile(file){
  uploadFile=file;
  $('filePreview').innerHTML='<strong>'+esc(file.name)+'</strong> ('+Math.round(file.size/1024)+' KB)';
}
function cerrarModalDoc(){$('modalDoc').classList.remove('show');uploadFile=null;$('filePreview').innerHTML='';$('fileInput').value='';}
function subirDoc(){
  if(!uploadFile){alert('Seleccione un archivo');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    $('modalDoc').querySelector('.btn-pri').textContent='Subiendo...';
    google.script.run.withSuccessHandler(function(){
      cerrarModalDoc();loadDocumentos();alert('Documento subido');
      $('modalDoc').querySelector('.btn-pri').textContent='Subir';
    }).withFailureHandler(function(err){
      alert('Error: '+err.message);
      $('modalDoc').querySelector('.btn-pri').textContent='Subir';
    }).subirDocumentoFrente(informesSector,informesFrente,uploadFile.name,base64,uploadFile.type);
  };
  reader.readAsDataURL(uploadFile);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('click',function(e){
  if(e.target.classList.contains('modal-bg'))e.target.classList.remove('show');
});
// Init drag drop when modal opens
var observer=new MutationObserver(function(){initDragDrop();});
observer.observe($('modalDoc'),{attributes:true,attributeFilter:['class']});
</script>
